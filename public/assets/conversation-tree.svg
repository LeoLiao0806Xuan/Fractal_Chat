<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7fc"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f1b2e">Visual Conversation Tree</text>
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b6580">Navigate, search, drag, fold — never lose context</text>

  <!-- Sidebar background -->
  <rect x="20" y="65" width="250" height="315" rx="12" fill="#faf9fe" stroke="#e0dcec" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="32" y="78" width="226" height="28" rx="7" fill="#fff" stroke="#e0dcec" stroke-width="1"/>
  <text x="46" y="96" font-family="system-ui, sans-serif" font-size="11" fill="#a8a0c0">🔍 Search conversations...</text>

  <!-- Tree items -->
  <!-- Level 0 -->
  <rect x="32" y="115" width="226" height="28" rx="6" fill="#ede9fe" stroke="#6366f1" stroke-width="1"/>
  <text x="60" y="133" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" font-weight="600">▼ Project Kickoff</text>
  <text x="238" y="133" font-family="system-ui, sans-serif" font-size="9" fill="#a8a0c0">3</text>

  <!-- Level 1 -->
  <rect x="44" y="150" width="214" height="26" rx="5" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>
  <text x="72" y="167" font-family="system-ui, sans-serif" font-size="11" fill="#4a4458">▶ Tech stack decisions</text>

  <rect x="44" y="180" width="214" height="26" rx="5" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>
  <text x="72" y="197" font-family="system-ui, sans-serif" font-size="11" fill="#4a4458">▼ Architecture design</text>

  <!-- Level 2 -->
  <rect x="56" y="210" width="202" height="24" rx="5" fill="#f5f3ff" stroke="#e0dcec" stroke-width="0.5"/>
  <text x="84" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed">Database schema</text>
  <circle cx="68" cy="222" r="3" fill="#a855f7"/>

  <rect x="56" y="238" width="202" height="24" rx="5" fill="#f5f3ff" stroke="#e0dcec" stroke-width="0.5"/>
  <text x="84" y="254" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed">API endpoints</text>
  <circle cx="68" cy="250" r="3" fill="#a855f7"/>

  <!-- Level 1 -->
  <rect x="44" y="270" width="214" height="26" rx="5" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>
  <text x="72" y="287" font-family="system-ui, sans-serif" font-size="11" fill="#4a4458">▶ UI mockups</text>

  <!-- Tags row -->
  <rect x="44" y="304" width="214" height="26" rx="5" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>
  <text x="68" y="321" font-family="system-ui, sans-serif" font-size="11" fill="#4a4458">Budget planning</text>
  <rect x="192" y="309" width="26" height="14" rx="4" fill="#10a37f" opacity="0.15"/>
  <text x="205" y="319" font-family="system-ui, sans-serif" font-size="8" fill="#10a37f">$</text>

  <!-- Archived section -->
  <text x="46" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#a8a0c0">📦 Archived (3)</text>

  <!-- Right side: Tree visualization -->
  <!-- Large tree diagram -->
  <line x1="520" y1="95" x2="520" y2="370" stroke="#e0dcec" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Main timeline node -->
  <circle cx="520" cy="110" r="12" fill="url(#purple)"/>
  <text x="520" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff">●</text>

  <rect x="550" y="98" width="180" height="24" rx="6" fill="#ede9fe"/>
  <text x="560" y="114" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1" font-weight="500">Project Kickoff</text>

  <!-- Branch 1 -->
  <line x1="520" y1="122" x2="520" y2="158" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <circle cx="520" cy="165" r="8" fill="#a855f7"/>
  <rect x="550" y="153" width="150" height="24" rx="6" fill="#f5f3ff"/>
  <text x="560" y="169" font-family="system-ui, sans-serif" font-size="11" fill="#7c3aed">Tech stack</text>

  <!-- Branch 1.1 -->
  <line x1="520" y1="173" x2="520" y2="198" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <circle cx="520" cy="205" r="5" fill="#c084fc"/>
  <rect x="550" y="193" width="120" height="22" rx="5" fill="#faf5ff"/>
  <text x="560" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#a855f7">Frontend</text>

  <!-- Branch 1.2 -->
  <line x1="520" y1="173" x2="450" y2="220" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <circle cx="450" cy="225" r="5" fill="#c084fc"/>
  <rect x="360" y="213" width="85" height="22" rx="5" fill="#faf5ff"/>
  <text x="370" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#a855f7">Backend</text>

  <!-- Branch 1.3 -->
  <line x1="520" y1="173" x2="600" y2="230" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="235" r="5" fill="#c084fc"/>
  <rect x="610" y="223" width="80" height="22" rx="5" fill="#faf5ff"/>
  <text x="620" y="238" font-family="system-ui, sans-serif" font-size="10" fill="#a855f7">Database</text>

  <!-- Branch 2 -->
  <line x1="520" y1="110" x2="580" y2="280" stroke="#a855f7" stroke-width="1.5" opacity="0.35"/>
  <circle cx="580" cy="285" r="8" fill="#ec4899"/>
  <rect x="595" y="273" width="140" height="24" rx="6" fill="#fdf2f8"/>
  <text x="605" y="289" font-family="system-ui, sans-serif" font-size="11" fill="#ec4899">UI Mockups</text>

  <!-- Branch 3 -->
  <line x1="520" y1="110" x2="430" y2="310" stroke="#a855f7" stroke-width="1.5" opacity="0.35"/>
  <circle cx="430" cy="315" r="8" fill="#d97706"/>
  <rect x="350" y="303" width="75" height="24" rx="6" fill="#fffbeb"/>
  <text x="360" y="319" font-family="system-ui, sans-serif" font-size="11" fill="#d97706">Budget</text>

  <!-- Legend -->
  <rect x="590" y="340" width="150" height="40" rx="8" fill="rgba(255,255,255,0.7)" stroke="#e0dcec" stroke-width="0.5"/>
  <circle cx="605" cy="355" r="4" fill="#a855f7"/>
  <text x="615" y="358" font-family="system-ui, sans-serif" font-size="9" fill="#6b6580">Sub-dialogue</text>
  <circle cx="605" cy="370" r="4" fill="#e0dcec"/>
  <text x="615" y="373" font-family="system-ui, sans-serif" font-size="9" fill="#6b6580">Leaf conversation</text>
</svg>
