<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7fc"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
    <linearGradient id="userBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#bg)" rx="12"/>

  <!-- ===== Step 1: Select text in a conversation ===== -->
  <rect x="20" y="30" width="235" height="280" rx="12" fill="#fff" stroke="#e0dcec" stroke-width="1"/>

  <!-- User bubble -->
  <rect x="30" y="45" width="160" height="28" rx="12" fill="url(#userBubble)"/>
  <text x="42" y="63" font-family="system-ui, sans-serif" font-size="11" fill="#fff">How do I use React hooks?</text>

  <!-- AI response -->
  <rect x="30" y="82" width="215" height="12" rx="6" fill="#e0dcec" opacity="0.4"/>
  <rect x="30" y="100" width="200" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="30" y="114" width="205" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="30" y="128" width="180" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>

  <!-- Code block in response -->
  <rect x="35" y="145" width="205" height="60" rx="6" fill="#0f0d1a"/>
  <text x="45" y="162" font-family="monospace, monospace" font-size="9" fill="#a78bfa">const [count, setCount] =</text>
  <text x="45" y="177" font-family="monospace, monospace" font-size="9" fill="#a78bfa">  useState(0);</text>
  <text x="45" y="192" font-family="monospace, monospace" font-size="9" fill="#c084fc">useEffect(() => {</text>
  <text x="52" y="207" font-family="monospace, monospace" font-size="9" fill="#e0dcec">document.title = count;</text>
  <text x="45" y="222" font-family="monospace, monospace" font-size="9" fill="#c084fc">}, [count]);</text>
  <rect x="35" y="230" width="50" height="16" rx="4" fill="#ede9fe"/>
  <text x="60" y="241" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7c3aed">javascript</text>

  <!-- Selected text highlight -->
  <rect x="30" y="258" width="195" height="28" rx="6" fill="#6366f1" opacity="0.12"/>
  <rect x="30" y="258" width="195" height="28" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="127" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1" font-weight="600">Selected: "useEffect..."</text>

  <!-- Step label -->
  <rect x="40" y="270" width="195" height="28" rx="7" fill="#f0eeff"/>
  <text x="137" y="289" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" font-weight="600">① Select text → Right-click</text>

  <!-- Arrow 1 -->
  <line x1="258" y1="170" x2="288" y2="170" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="288,165 298,170 288,175" fill="#a855f7"/>

  <!-- ===== Step 2: Context menu ===== -->
  <rect x="302" y="30" width="235" height="280" rx="12" fill="#fff" stroke="#e0dcec" stroke-width="1"/>

  <!-- Context menu -->
  <rect x="320" y="55" width="190" height="190" rx="10" fill="#fff" stroke="#d4d0e4" stroke-width="1" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <text x="335" y="80" font-family="system-ui, sans-serif" font-size="12" fill="#1f1b2e" font-weight="600">Actions</text>
  <rect x="335" y="90" width="160" height="1" fill="#e0dcec"/>

  <rect x="330" y="97" width="170" height="26" rx="6" fill="#f0eeff"/>
  <text x="345" y="114" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">✏️ Rename</text>

  <rect x="330" y="127" width="170" height="26" rx="6" fill="#ede9fe"/>
  <text x="345" y="144" font-family="system-ui, sans-serif" font-size="11" fill="#7c3aed" font-weight="600">✨ New sub-dialogue</text>

  <rect x="330" y="157" width="170" height="1" fill="#e0dcec"/>

  <rect x="330" y="163" width="170" height="26" rx="6" fill="#f0eeff"/>
  <text x="345" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">📤 Export</text>

  <rect x="330" y="193" width="170" height="26" rx="6" fill="#f0eeff"/>
  <text x="345" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">🏷️ Add tag</text>

  <rect x="330" y="223" width="170" height="26" rx="6" fill="#fee2e2"/>
  <text x="345" y="240" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444">🗑️ Delete</text>

  <!-- Step label -->
  <rect x="322" y="270" width="195" height="28" rx="7" fill="#f0eeff"/>
  <text x="419" y="289" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" font-weight="600">② Create sub-dialogue</text>

  <!-- Arrow 2 -->
  <line x1="540" y1="170" x2="570" y2="170" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="570,165 580,170 570,175" fill="#a855f7"/>

  <!-- ===== Step 3: Sub-dialogue chat panel ===== -->
  <rect x="584" y="30" width="196" height="280" rx="12" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>

  <!-- Sub-dialogue header -->
  <rect x="584" y="30" width="196" height="30" rx="12" fill="#a855f7"/>
  <rect x="584" y="50" width="196" height="10" fill="#a855f7"/>
  <circle cx="604" cy="45" r="6" fill="#fff" opacity="0.3"/>
  <text x="620" y="49" font-family="system-ui, sans-serif" font-size="10" fill="#fff" font-weight="600">Sub: useEffect</text>

  <!-- User query in sub-dialogue -->
  <rect x="615" y="65" width="150" height="24" rx="10" fill="url(#userBubble)" opacity="0.85"/>
  <text x="625" y="81" font-family="system-ui, sans-serif" font-size="10" fill="#fff">Why is this needed?</text>

  <!-- AI response in sub-dialogue -->
  <rect x="594" y="97" width="176" height="10" rx="5" fill="#e0dcec" opacity="0.4"/>
  <rect x="594" y="112" width="160" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="594" y="125" width="170" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>

  <!-- Code block in sub-dialogue -->
  <rect x="599" y="140" width="166" height="52" rx="5" fill="#0f0d1a"/>
  <text x="608" y="155" font-family="monospace, monospace" font-size="8.5" fill="#a78bfa">useEffect(() => {</text>
  <text x="614" y="168" font-family="monospace, monospace" font-size="8.5" fill="#e0dcec">fetchData()</text>
  <text x="614" y="181" font-family="monospace, monospace" font-size="8.5" fill="#e0dcec">  .then(setData);</text>
  <text x="608" y="194" font-family="monospace, monospace" font-size="8.5" fill="#a78bfa">}, []); // runs once</text>

  <!-- Merge button -->
  <rect x="594" y="200" width="120" height="22" rx="6" fill="#ede9fe" stroke="#a855f7" stroke-width="1"/>
  <text x="654" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7c3aed" font-weight="600">↕ Merge back</text>

  <!-- Depth indicator -->
  <line x1="594" y1="235" x2="594" y2="270" stroke="#e0dcec" stroke-width="1" stroke-dasharray="3"/>
  <text x="598" y="250" font-family="system-ui, sans-serif" font-size="8" fill="#a8a0c0">Depth 2 — can go deeper ↓</text>

  <!-- Step label -->
  <rect x="604" y="270" width="156" height="28" rx="7" fill="#f5f3ff" stroke="#a855f7" stroke-width="0.5"/>
  <text x="682" y="289" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7c3aed" font-weight="600">③ Branch & dive deeper</text>
</svg>
