<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7fc"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
    <linearGradient id="select" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)" rx="12"/>

  <!-- Step 1: Select text -->
  <rect x="30" y="30" width="220" height="240" rx="12" fill="#fff" stroke="#e0dcec" stroke-width="1"/>
  <rect x="45" y="50" width="190" height="12" rx="6" fill="#e0dcec"/>
  <rect x="45" y="72" width="160" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="45" y="88" width="175" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="45" y="104" width="140" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <!-- Selected text highlight -->
  <rect x="45" y="120" width="180" height="28" rx="6" fill="#6366f1" opacity="0.12"/>
  <rect x="45" y="120" width="180" height="28" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="135" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" font-weight="600">Selected text</text>
  <rect x="45" y="156" width="130" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="45" y="172" width="160" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="45" y="188" width="110" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <!-- Step label -->
  <rect x="50" y="225" width="180" height="30" rx="8" fill="#f0eeff"/>
  <text x="140" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" font-weight="600">① Select any text</text>

  <!-- Arrow -->
  <line x1="255" y1="150" x2="295" y2="150" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="295,145 305,150 295,155" fill="#a855f7"/>

  <!-- Step 2: Right-click → New sub-dialogue -->
  <rect x="310" y="30" width="220" height="240" rx="12" fill="#fff" stroke="#e0dcec" stroke-width="1"/>
  <!-- Context menu -->
  <rect x="340" y="50" width="150" height="160" rx="8" fill="#fff" stroke="#d4d0e4" stroke-width="1" style="box-shadow: 0 4px 20px rgba(0,0,0,0.08)"/>
  <rect x="355" y="60" width="120" height="24" rx="6" fill="#f0eeff"/>
  <text x="415" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">Rename</text>
  <rect x="355" y="90" width="120" height="24" rx="6" fill="#f0eeff"/>
  <text x="415" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">Merge up</text>
  <rect x="355" y="120" width="120" height="24" rx="6" fill="#ede9fe"/>
  <text x="415" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7c3aed" font-weight="600">✨ New sub-dialogue</text>
  <rect x="355" y="150" width="120" height="1" fill="#e0dcec"/>
  <rect x="355" y="160" width="120" height="24" rx="6" fill="#f0eeff"/>
  <text x="415" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">Export</text>
  <rect x="355" y="190" width="120" height="24" rx="6" fill="#fee2e2"/>
  <text x="415" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444">Delete</text>
  <!-- Step label -->
  <rect x="330" y="225" width="180" height="30" rx="8" fill="#f0eeff"/>
  <text x="420" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" font-weight="600">② Right-click → Sub</text>

  <!-- Arrow -->
  <line x1="535" y1="150" x2="575" y2="150" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="575,145 585,150 575,155" fill="#a855f7"/>

  <!-- Step 3: Branch & chat -->
  <rect x="590" y="30" width="180" height="240" rx="12" fill="#fff" stroke="#e0dcec" stroke-width="1"/>
  <!-- Branching visualization -->
  <line x1="680" y1="50" x2="680" y2="90" stroke="#a855f7" stroke-width="2"/>
  <circle cx="680" cy="50" r="6" fill="#6366f1"/>
  <line x1="680" y1="90" x2="640" y2="130" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="680" y1="90" x2="720" y2="130" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="640" cy="130" r="4" fill="#a855f7"/>
  <circle cx="720" cy="130" r="4" fill="#a855f7"/>
  <line x1="680" y1="90" x2="680" y2="170" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="680" cy="170" r="5" fill="#7c3aed"/>
  <line x1="680" y1="170" x2="720" y2="200" stroke="#a855f7" stroke-width="1"/>
  <line x1="680" y1="170" x2="640" y2="200" stroke="#a855f7" stroke-width="1"/>
  <circle cx="720" cy="200" r="3" fill="#a855f7"/>
  <circle cx="640" cy="200" r="3" fill="#a855f7"/>

  <!-- Step label -->
  <rect x="610" y="225" width="140" height="30" rx="8" fill="#f0eeff"/>
  <text x="680" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" font-weight="600">③ Branch & chat</text>
</svg>
