<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#f8f7fc" rx="12"/>

  <!-- Step 1 -->
  <rect x="20" y="20" width="235" height="280" rx="10" fill="#fff" stroke="#d4d0e4" stroke-width="1"/>
  <text x="30" y="44" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">你:</text>
  <text x="60" y="44" font-family="sans-serif" font-size="12" fill="#333">React hooks 怎么用？</text>
  <text x="30" y="66" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7c3aed">AI:</text>
  <text x="60" y="66" font-family="sans-serif" font-size="12" fill="#555">React hooks 让你在函数组件中</text>
  <text x="60" y="84" font-family="sans-serif" font-size="12" fill="#555">使用状态和其他特性。例如：</text>

  <rect x="35" y="115" width="200" height="55" rx="5" fill="#0f0d1a"/>
  <text x="45" y="133" font-family="sans-serif" font-size="9" fill="#a78bfa">const [count, setCount] =</text>
  <text x="45" y="148" font-family="sans-serif" font-size="9" fill="#a78bfa">  useState(0);</text>
  <text x="45" y="163" font-family="sans-serif" font-size="9" fill="#c084fc">useEffect(() =&gt; { ... }, []);</text>

  <rect x="30" y="180" width="195" height="26" rx="6" fill="#6366f1" opacity="0.12"/>
  <rect x="30" y="180" width="195" height="26" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="127" y="197" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6366f1" font-weight="bold">已选中：useEffect</text>

  <rect x="40" y="270" width="195" height="24" rx="6" fill="#f0eeff"/>
  <text x="137" y="286" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6366f1" font-weight="bold">步骤 1：选中文本</text>

  <!-- Arrow -->
  <line x1="258" y1="160" x2="288" y2="160" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="288,155 298,160 288,165" fill="#a855f7"/>

  <!-- Step 2 -->
  <rect x="302" y="20" width="235" height="280" rx="10" fill="#fff" stroke="#d4d0e4" stroke-width="1"/>
  <rect x="320" y="40" width="200" height="190" rx="8" fill="#fff" stroke="#d4d0e4" stroke-width="1"/>

  <text x="335" y="66" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f1b2e">操作</text>
  <rect x="330" y="76" width="180" height="1" fill="#e0dcec"/>

  <rect x="330" y="84" width="180" height="26" rx="5" fill="#f0eeff"/>
  <text x="345" y="101" font-family="sans-serif" font-size="11" fill="#6366f1">重命名</text>

  <rect x="330" y="114" width="180" height="26" rx="5" fill="#ede9fe"/>
  <text x="345" y="131" font-family="sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">新建子对话</text>

  <rect x="330" y="144" width="180" height="1" fill="#e0dcec"/>

  <rect x="330" y="150" width="180" height="26" rx="5" fill="#f0eeff"/>
  <text x="345" y="167" font-family="sans-serif" font-size="11" fill="#6366f1">导出</text>

  <rect x="330" y="180" width="180" height="26" rx="5" fill="#fee2e2"/>
  <text x="345" y="197" font-family="sans-serif" font-size="11" fill="#ef4444">删除</text>

  <rect x="322" y="270" width="195" height="24" rx="6" fill="#f0eeff"/>
  <text x="419" y="286" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6366f1" font-weight="bold">步骤 2：右键 → 新建</text>

  <!-- Arrow -->
  <line x1="540" y1="160" x2="570" y2="160" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="570,155 580,160 570,165" fill="#a855f7"/>

  <!-- Step 3 -->
  <rect x="584" y="20" width="196" height="280" rx="10" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>

  <rect x="584" y="20" width="196" height="28" rx="10" fill="#a855f7"/>
  <text x="682" y="38" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">子对话：useEffect</text>

  <rect x="610" y="56" width="155" height="24" rx="10" fill="#7c3aed"/>
  <text x="620" y="72" font-family="sans-serif" font-size="11" fill="#fff">为什么需要这个？</text>

  <text x="594" y="104" font-family="sans-serif" font-size="11" fill="#555">useEffect 在渲染后执行</text>
  <text x="594" y="122" font-family="sans-serif" font-size="11" fill="#555">副作用。常见用途：</text>

  <rect x="594" y="133" width="176" height="48" rx="5" fill="#0f0d1a"/>
  <text x="604" y="150" font-family="sans-serif" font-size="9" fill="#a78bfa">useEffect(() =&gt; {</text>
  <text x="610" y="165" font-family="sans-serif" font-size="9" fill="#e0dcec">  fetchData();</text>
  <text x="604" y="180" font-family="sans-serif" font-size="9" fill="#a78bfa">}, []);</text>

  <rect x="594" y="192" width="100" height="22" rx="5" fill="#ede9fe" stroke="#a855f7" stroke-width="1"/>
  <text x="644" y="207" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" font-weight="bold">合并回父对话</text>

  <rect x="604" y="270" width="156" height="24" rx="6" fill="#f5f3ff" stroke="#a855f7" stroke-width="0.5"/>
  <text x="682" y="286" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7c3aed" font-weight="bold">步骤 3：深入探讨</text>
</svg>
