<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7fc"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>

  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1f1b2e">🌿 Fractal Chat</text>
  <text x="400" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6b6580">基于递归对话树的多模型 AI 聊天工具</text>

  <!-- Root node -->
  <rect x="365" y="100" width="70" height="28" rx="14" fill="#6366f1" opacity="0.9"/>
  <text x="400" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">根对话</text>

  <!-- Level 1 branches -->
  <line x1="365" y1="114" x2="200" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="128" x2="400" y2="170" stroke="#a855f7" stroke-width="1.5" opacity="0.4"/>
  <line x1="435" y1="114" x2="600" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>

  <!-- Level 1 nodes -->
  <rect x="145" y="170" width="110" height="32" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6366f1">头脑风暴</text>

  <rect x="355" y="170" width="90" height="32" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a855f7">深入讨论</text>

  <rect x="545" y="170" width="110" height="32" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="600" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6366f1">代码审查</text>

  <!-- Level 2 from "深入讨论" -->
  <line x1="400" y1="202" x2="280" y2="260" stroke="#a855f7" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="202" x2="520" y2="260" stroke="#a855f7" stroke-width="1.5" opacity="0.35"/>

  <rect x="220" y="260" width="120" height="32" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
  <text x="280" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a855f7">追问细节</text>

  <rect x="460" y="260" width="120" height="32" rx="8" fill="#fff" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
  <text x="520" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ec4899">获取示例</text>

  <!-- Level 3 from "获取示例" -->
  <line x1="520" y1="292" x2="400" y2="350" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
  <line x1="520" y1="292" x2="560" y2="350" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
  <line x1="520" y1="292" x2="480" y2="350" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
  <line x1="520" y1="292" x2="640" y2="350" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>

  <rect x="345" y="350" width="110" height="28" rx="14" fill="#f0eeff" stroke="#a855f7" stroke-width="1"/>
  <text x="400" y="368" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed">案例 1</text>

  <rect x="505" y="350" width="110" height="28" rx="14" fill="#f0eeff" stroke="#a855f7" stroke-width="1"/>
  <text x="560" y="368" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed">案例 2</text>

  <rect x="425" y="350" width="110" height="28" rx="14" fill="#f0eeff" stroke="#a855f7" stroke-width="1"/>
  <text x="480" y="368" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed">案例 3</text>

  <rect x="585" y="350" width="110" height="28" rx="14" fill="#f0eeff" stroke="#a855f7" stroke-width="1"/>
  <text x="640" y="368" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed">案例 4</text>

  <text x="105" y="230" font-family="sans-serif" font-size="11" fill="#6b6580" transform="rotate(-25, 105, 230)">选中文本 →</text>
  <text x="680" y="230" font-family="sans-serif" font-size="11" fill="#6b6580" transform="rotate(20, 680, 230)">→ 子对话</text>
  <text x="530" y="320" font-family="sans-serif" font-size="11" fill="#6b6580">↕ 合并回父对话</text>

  <line x1="640" y1="378" x2="700" y2="410" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="700" y="425" font-family="sans-serif" font-size="10" fill="#a855f7" opacity="0.6">∞ 递归深入</text>

  <rect x="20" y="380" width="100" height="50" rx="10" fill="rgba(255,255,255,0.6)" stroke="#d4d0e4" stroke-width="1" opacity="0.5"/>
  <circle cx="45" cy="405" r="8" fill="#6366f1" opacity="0.3"/>
  <circle cx="70" cy="405" r="8" fill="#a855f7" opacity="0.3"/>
  <circle cx="95" cy="405" r="8" fill="#ec4899" opacity="0.3"/>
</svg>
