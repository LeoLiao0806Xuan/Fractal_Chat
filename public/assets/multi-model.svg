<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7fc"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
    <linearGradient id="gpt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8c6d"/>
    </linearGradient>
    <linearGradient id="ds" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="cl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f1b2e">Multi-Model Parallel Comparison</text>
  <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b6580">Send one prompt → watch responses stream side by side</text>

  <!-- Input area -->
  <rect x="40" y="75" width="720" height="50" rx="12" fill="#fff" stroke="#e0dcec" stroke-width="1"/>
  <text x="60" y="103" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" font-weight="500">"Explain quantum computing in simple terms"</text>
  <rect x="680" y="83" width="65" height="34" rx="8" fill="url(#gpt)"/>
  <text x="712" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fff" font-weight="600">Send</text>

  <!-- Labels row -->
  <text x="60" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#6b6580">Selected models:</text>
  <rect x="170" y="138" width="80" height="22" rx="6" fill="#10a37f" opacity="0.1"/>
  <text x="210" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#10a37f" font-weight="600">GPT-4o</text>
  <rect x="260" y="138" width="90" height="22" rx="6" fill="#4f46e5" opacity="0.1"/>
  <text x="305" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4f46e5" font-weight="600">DeepSeek V3</text>
  <rect x="360" y="138" width="80" height="22" rx="6" fill="#d97706" opacity="0.1"/>
  <text x="400" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d97706" font-weight="600">Claude 4</text>

  <!-- Column backgrounds -->
  <rect x="40" y="175" width="230" height="200" rx="10" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>
  <rect x="285" y="175" width="230" height="200" rx="10" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>
  <rect x="530" y="175" width="230" height="200" rx="10" fill="#fff" stroke="#e0dcec" stroke-width="0.5"/>

  <!-- Column headers -->
  <rect x="40" y="175" width="230" height="32" rx="10" fill="#10a37f"/>
  <rect x="40" y="197" width="230" height="10" fill="#10a37f"/>
  <text x="155" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="600">GPT-4o</text>

  <rect x="285" y="175" width="230" height="32" rx="10" fill="#4f46e5"/>
  <rect x="285" y="197" width="230" height="10" fill="#4f46e5"/>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="600">DeepSeek V3</text>

  <rect x="530" y="175" width="230" height="32" rx="10" fill="#d97706"/>
  <rect x="530" y="197" width="230" height="10" fill="#d97706"/>
  <text x="645" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="600">Claude 4</text>

  <!-- Column content - streaming lines -->
  <!-- GPT-4o -->
  <rect x="55" y="215" width="200" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="55" y="231" width="180" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="55" y="247" width="195" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="55" y="263" width="160" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="55" y="279" width="185" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="55" y="295" width="140" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>

  <!-- Streaming dots -->
  <circle cx="55" cy="320" r="3" fill="#10a37f" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="70" cy="320" r="3" fill="#10a37f" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="85" cy="320" r="3" fill="#10a37f" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- DeepSeek - more content -->
  <rect x="300" y="215" width="200" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="300" y="231" width="190" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="300" y="247" width="210" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="300" y="263" width="170" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="300" y="279" width="200" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="300" y="295" width="150" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="300" y="311" width="180" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>

  <circle cx="300" cy="340" r="3" fill="#4f46e5" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="315" cy="340" r="3" fill="#4f46e5" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Claude - most content -->
  <rect x="545" y="215" width="200" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="545" y="231" width="185" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="545" y="247" width="205" height="8" rx="4" fill="#e0dcec" opacity="0.5"/>
  <rect x="545" y="263" width="175" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="545" y="279" width="195" height="8" rx="4" fill="#e0dcec" opacity="0.4"/>
  <rect x="545" y="295" width="160" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="545" y="311" width="140" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>
  <rect x="545" y="327" width="190" height="8" rx="4" fill="#e0dcec" opacity="0.3"/>

  <circle cx="545" cy="355" r="3" fill="#d97706" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
  </circle>
  <circle cx="560" cy="355" r="3" fill="#d97706" opacity="0.8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
</svg>
